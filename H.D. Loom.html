<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>黄道婆织布机</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
        #info {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
            background: rgba(0,0,0,0.7);
            padding: 20px 30px;
            border-radius: 10px;
            z-index: 20;
        }
        #error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff6b6b;
            font-size: 16px;
            background: rgba(0,0,0,0.8);
            padding: 20px 30px;
            border-radius: 10px;
            display: none;
            z-index: 30;
            text-align: center;
        }
        #autoRotateHint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            z-index: 10;
            cursor: pointer;
            transition: background 0.3s, opacity 0.5s;
            user-select: none;
        }
        #autoRotateHint:hover {
            background: rgba(0,0,0,0.8);
        }
        #loading {
            transition: opacity 0.4s;
        }
    </style>
</head>
<body>
    <div id="info">H.D. Loom 3D模型 - 拖拽旋转 / 滚轮缩放</div>
    <div id="loading">⏳ 加载模型中...</div>
    <div id="error">❌ 模型加载失败<br/><span style="font-size:12px;">请确保 H.D. Loom.glb 文件在同一目录下</span></div>
    <div id="autoRotateHint">⏸ 自动旋转 (点击切换)</div>

    <!-- 引入 Three.js 核心库和扩展 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

        // --- 初始化场景、相机、渲染器 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff); // 白色背景

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 3, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // --- 控制器 ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 2.0;
        controls.target.set(0, 0, 0);

        // --- 灯光 ---
        // 环境光
        const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambientLight);

        // 主光 - 方向光
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // 辅助背光
        const backLight = new THREE.DirectionalLight(0x4488ff, 0.8);
        backLight.position.set(-5, 0, -5);
        scene.add(backLight);

        // 补光
        const fillLight = new THREE.DirectionalLight(0xffaa44, 0.4);
        fillLight.position.set(-3, 2, 5);
        scene.add(fillLight);

        // 半球光
        const hemiLight = new THREE.HemisphereLight(0x4488ff, 0x002244, 0.6);
        scene.add(hemiLight);


        // --- 加载模型 ---
        const loader = new GLTFLoader();
        const dracoLoader = new DRACOLoader();
        dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
        loader.setDRACOLoader(dracoLoader);

        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');

        // 使用相对路径加载同目录下的 H.D. Loom.glb
        let isLoaded = true; // 加载失败时设为 false，停止渲染

        const hintEl = document.getElementById('autoRotateHint');

        function updateAutoRotateHint() {
            hintEl.textContent = controls.autoRotate ? '▶ 自动旋转中 (点击切换)' : '⏸ 已暂停 (点击切换)';
        }
        loader.load(
            './H.D. Loom.glb',
            function (gltf) {
                const model = gltf.scene;

                // 自动居中模型
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                model.position.sub(center);

                // 调整模型大小以适应视野
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                if (maxDim > 5) {
                    model.scale.multiplyScalar(5 / maxDim);
                } else if (maxDim > 0 && maxDim < 1) {
                    model.scale.multiplyScalar(1 / maxDim);
                }

                scene.add(model);

                // 释放解码器资源
                dracoLoader.dispose();

                // 平滑隐藏加载提示
                loadingEl.style.opacity = '0';
                setTimeout(() => { loadingEl.style.display = 'none'; }, 400);

                updateAutoRotateHint();

                console.log('✅ H.D. Loom.glb 加载成功');
            },
            function (xhr) {
                // 加载进度
                const percent = Math.round((xhr.loaded / xhr.total) * 100);
                loadingEl.textContent = `⏳ 加载中... ${percent}%`;
            },
            function (error) {
                console.error('❌ 加载失败:', error);
                loadingEl.style.opacity = '0';
                setTimeout(() => {
                    loadingEl.style.display = 'none';
                    errorEl.style.display = 'block';
                }, 400);
                // 加载失败时停止渲染以节省资源
                isLoaded = false;
            }
        );

        // --- 窗口大小自适应 ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- 动画循环 ---
        function animate() {
            requestAnimationFrame(animate);
            if (!isLoaded) return;
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // 点击切换自动旋转
        renderer.domElement.addEventListener('click', () => {
            controls.autoRotate = !controls.autoRotate;
            updateAutoRotateHint();
        });

        hintEl.addEventListener('click', () => {
            controls.autoRotate = !controls.autoRotate;
            updateAutoRotateHint();
        });
    </script>
</body>
</html>
