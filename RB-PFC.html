<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>圆底植物质陶釜 - 展陈版</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
        #info {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
            background: rgba(0,0,0,0.7);
            padding: 20px 30px;
            border-radius: 10px;
            z-index: 20;
            transition: opacity 0.4s;
        }
        #error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff6b6b;
            font-size: 16px;
            background: rgba(0,0,0,0.8);
            padding: 20px 30px;
            border-radius: 10px;
            display: none;
            z-index: 30;
            text-align: center;
        }
        #autoRotateHint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            z-index: 10;
            cursor: pointer;
            transition: background 0.3s, opacity 0.5s;
            user-select: none;
        }
        #autoRotateHint:hover {
            background: rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
    <div id="info">圆底植物质陶釜 3D模型 - 拖拽旋转 / 滚轮缩放</div>
    <div id="loading">⏳ 加载模型中...</div>
    <div id="error">❌ 模型加载失败<br/><span style="font-size:12px;">请确保 RB-PFC.glb 文件在同一目录下</span></div>
    <div id="autoRotateHint">▶ 自动旋转中 (点击切换)</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

        // --- 初始化场景、相机、渲染器 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 3, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // --- 控制器 ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 2.0;
        controls.target.set(0, 0, 0);

        // --- 灯光 ---
        const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        scene.add(dirLight);

        const backLight = new THREE.DirectionalLight(0x4488ff, 0.8);
        backLight.position.set(-5, 0, -5);
        scene.add(backLight);

        const fillLight = new THREE.DirectionalLight(0xffaa44, 0.4);
        fillLight.position.set(-3, 2, 5);
        scene.add(fillLight);

        const hemiLight = new THREE.HemisphereLight(0x4488ff, 0x002244, 0.6);
        scene.add(hemiLight);

        // --- 地面网格辅助 ---
        const gridHelper = new THREE.GridHelper(10, 20, 0x8888ff, 0x444466);
        gridHelper.position.y = -1;
        scene.add(gridHelper);

        // --- 音频（方案三：仅自动播放一次，作为环境音）---
        const audio = new Audio('./background.mp3');
        audio.loop = true;
        audio.volume = 0.5;

        // 尝试自动播放（浏览器可能阻止，需要用户交互）
        function tryAutoPlayMusic() {
            audio.play().catch(() => {
                // 如果自动播放被阻止，监听首次点击播放
                const firstClickHandler = () => {
                    audio.play().catch(e => console.warn('音频播放失败', e));
                    renderer.domElement.removeEventListener('click', firstClickHandler);
                    hintEl.removeEventListener('click', firstClickHandler);
                    console.log('用户首次交互后音乐启动');
                };
                renderer.domElement.addEventListener('click', firstClickHandler);
                hintEl.addEventListener('click', firstClickHandler);
            });
        }

        // --- 加载模型 ---
        const loader = new GLTFLoader();
        const dracoLoader = new DRACOLoader();
        dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
        loader.setDRACOLoader(dracoLoader);

        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');
        const hintEl = document.getElementById('autoRotateHint');

        let isLoaded = true;

        function updateAutoRotateHint() {
            hintEl.textContent = controls.autoRotate
                ? '▶ 自动旋转中 (点击切换)'
                : '⏸ 已暂停 (点击切换)';
        }

        loader.load(
            './RB-PFC.glb',
            function (gltf) {
                const model = gltf.scene;
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                model.position.sub(center);

                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                if (maxDim > 5) {
                    model.scale.multiplyScalar(5 / maxDim);
                } else if (maxDim > 0 && maxDim < 1) {
                    model.scale.multiplyScalar(1 / maxDim);
                }

                scene.add(model);
                dracoLoader.dispose();

                loadingEl.style.opacity = '0';
                setTimeout(() => { loadingEl.style.display = 'none'; }, 400);

                updateAutoRotateHint();

                // 模型加载完成后，尝试自动播放音乐（环境音）
                tryAutoPlayMusic();

                console.log('✅ RB-PFC.glb 加载成功');
            },
            function (xhr) {
                const percent = Math.round((xhr.loaded / xhr.total) * 100);
                loadingEl.textContent = `⏳ 加载中... ${percent}%`;
            },
            function (error) {
                console.error('❌ 加载失败:', error);
                loadingEl.style.opacity = '0';
                setTimeout(() => {
                    loadingEl.style.display = 'none';
                    errorEl.style.display = 'block';
                }, 400);
                isLoaded = false;
            }
        );

        // --- 窗口自适应 ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- 动画循环 ---
        function animate() {
            requestAnimationFrame(animate);
            if (!isLoaded) return;
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // --- 点击切换自动旋转（音乐不受影响）---
        function toggleAutoRotate() {
            controls.autoRotate = !controls.autoRotate;
            updateAutoRotateHint();
            // 音乐不在这里控制，保持播放状态
        }

        renderer.domElement.addEventListener('click', toggleAutoRotate);
        hintEl.addEventListener('click', toggleAutoRotate);
    </script>
</body>
</html>
